name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push worker container image
        run: make ensure-image REGION=${{ vars.AWS_REGION }}

      - name: Build artifacts
        run: make build

      - name: Upload artifacts to S3
        run: make upload BUCKET=${{ vars.DEPLOY_BUCKET }}

      - name: Deploy CloudFormation stack
        run: |
          make deploy \
            BUCKET=${{ vars.DEPLOY_BUCKET }} \
            SES_IDENTITY=${{ secrets.SES_IDENTITY }} \
            REGION=${{ vars.AWS_REGION }}

      - name: Diagnose deployment failure
        if: failure()
        env:
          REGION: ${{ vars.AWS_REGION }}
          STACK: llm-rss-iacr
        run: |
          echo "=== Stack status ==="
          aws cloudformation describe-stacks --region "$REGION" --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>&1 || true
          echo "=== Recent stack events (FAILED) ==="
          aws cloudformation describe-stack-events --region "$REGION" --stack-name "$STACK" \
            --query 'StackEvents[?contains(ResourceStatus, `FAILED`)].[LogicalResourceId,ResourceStatusReason]' \
            --output text 2>&1 | head -40 || true
          echo "=== Newest change set validation detail ==="
          CS=$(aws cloudformation list-change-sets --region "$REGION" --stack-name "$STACK" \
            --query 'sort_by(Summaries, &CreationTime)[-1].ChangeSetId' --output text 2>/dev/null)
          echo "change set: $CS"
          aws cloudformation describe-change-set --region "$REGION" --change-set-name "$CS" \
            --query '[Status,StatusReason]' --output text 2>&1 || true
          echo "--- per-resource validation events ---"
          aws cloudformation describe-events --region "$REGION" --change-set-name "$CS" \
            --query 'OperationEvents[?EventType==`VALIDATION_ERROR`].[LogicalResourceId,ResourceStatusReason,StatusReason]' \
            --output text 2>&1 || true
          echo "--- raw events fallback ---"
          aws cloudformation describe-events --region "$REGION" --change-set-name "$CS" \
            --output json 2>&1 | head -60 || true
