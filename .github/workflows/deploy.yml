name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push worker container image
        run: make ensure-image REGION=${{ vars.AWS_REGION }}

      - name: Build artifacts
        run: make build

      - name: Upload artifacts to S3
        run: make upload BUCKET=${{ vars.DEPLOY_BUCKET }}

      - name: Deploy CloudFormation stack
        run: |
          make deploy \
            BUCKET=${{ vars.DEPLOY_BUCKET }} \
            SES_IDENTITY=${{ secrets.SES_IDENTITY }} \
            REGION=${{ vars.AWS_REGION }}

      # On a failed deploy, the bare "ResourceExistenceCheck" error from
      # `cloudformation deploy` doesn't name the offending resource. This step
      # pulls the per-resource VALIDATION_ERROR details from the newest change
      # set so the actual cause (name conflict, missing dependency, etc.) is
      # visible in the run log.
      - name: Diagnose deployment failure
        if: failure()
        env:
          REGION: ${{ vars.AWS_REGION }}
          STACK: llm-rss-iacr
        run: |
          aws cloudformation describe-stacks --region "$REGION" --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>&1 || true
          CS=$(aws cloudformation list-change-sets --region "$REGION" --stack-name "$STACK" \
            --query 'sort_by(Summaries, &CreationTime)[-1].ChangeSetId' --output text 2>/dev/null)
          echo "newest change set: $CS"
          aws cloudformation describe-events --region "$REGION" --change-set-name "$CS" \
            --query 'OperationEvents[?EventType==`VALIDATION_ERROR`].[ValidationName,LogicalResourceId,ValidationStatusReason]' \
            --output text 2>&1 || true
