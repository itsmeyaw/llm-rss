AWSTemplateFormatVersion: "2010-09-09"
Description: "llm-rss IACR source — Lambda, Layer, EventBridge schedule, IAM"

Parameters:
  DeploymentBucket:
    Type: String
    Description: S3 bucket holding Lambda code and layer zips

  LambdaZipKey:
    Type: String
    Description: S3 key for the Lambda function zip
    Default: llm-rss/iacr-lambda.zip

  LayerZipKey:
    Type: String
    Description: S3 key for the Lambda layer zip
    Default: llm-rss/iacr-layer.zip

  TriggerZipKey:
    Type: String
    Description: S3 key for the Trigger Lambda zip
    Default: llm-rss/trigger-lambda.zip

  DeepDiveImageUri:
    Type: String
    Description: >
      ECR image URI for the Deep Dive worker Lambda, tagged by content hash.
      Format: <account>.dkr.ecr.<region>.amazonaws.com/llm-rss-deep-dive-worker:<hash>
      Obtain via: make ensure-image

  SesVerifiedIdentity:
    Type: String
    Description: SES verified email address used as sender/recipient (must be verified in SES)

Resources:

  # -------------------------------------------------------------------------
  # Deep Dive model ID — stronger model than the batch handler
  # -------------------------------------------------------------------------
  DeepDiveModelId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /llm-rss/iacr/deep-dive-model-id
      Type: String
      Value: us.anthropic.claude-sonnet-4-6
      Description: >
        Bedrock model ID used by the Deep Dive worker for full-paper analysis.
        Defaults to Claude Sonnet; update to a stronger model as needed.

  # -------------------------------------------------------------------------
  # Lambda Layer (dependencies)
  # -------------------------------------------------------------------------
  DependenciesLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: llm-rss-iacr-deps
      Description: Python dependencies for llm-rss IACR handler
      CompatibleRuntimes:
        - python3.12
      Content:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Ref LayerZipKey

  # -------------------------------------------------------------------------
  # IAM Role — batch handler
  # -------------------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: llm-rss-iacr-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: llm-rss-iacr-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadSSMParams
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/llm-rss/*"
              - Sid: InvokeBedrock
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
              - Sid: SendSES
                Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource:
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${SesVerifiedIdentity}"
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:configuration-set/*"

  # -------------------------------------------------------------------------
  # IAM Role — trigger Lambda
  # -------------------------------------------------------------------------
  TriggerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: llm-rss-trigger-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: llm-rss-trigger-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadSigningSecret
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/llm-rss/deep-dive/*"
              - Sid: InvokeWorker
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:llm-rss-deep-dive-worker"
                  # The worker function is defined later in this template as DeepDiveWorkerLambda

  # -------------------------------------------------------------------------
  # IAM Role — Deep Dive worker Lambda
  # -------------------------------------------------------------------------
  WorkerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: llm-rss-deep-dive-worker-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: llm-rss-worker-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadSSMParams
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/llm-rss/*"
              - Sid: InvokeBedrock
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
              - Sid: SendSES
                Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource:
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${SesVerifiedIdentity}"
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:configuration-set/*"

  # -------------------------------------------------------------------------
  # Lambda Function — batch handler
  # -------------------------------------------------------------------------
  IacrLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: llm-rss-iacr
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Layers:
        - !Ref DependenciesLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Ref LambdaZipKey
      Environment:
        Variables:
          PYTHONPATH: /opt/python
          DEEP_DIVE_BASE_URL: !GetAtt TriggerFunctionUrl.FunctionUrl
          DEEP_DIVE_SIGNING_SECRET: !Sub "{{resolve:ssm-secure:/llm-rss/deep-dive/signing-secret}}"

  # -------------------------------------------------------------------------
  # Lambda Function — trigger (public entry point)
  # -------------------------------------------------------------------------
  TriggerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: llm-rss-deep-dive-trigger
      Runtime: python3.12
      Handler: trigger_handler.lambda_handler
      Role: !GetAtt TriggerExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Ref TriggerZipKey
      Environment:
        Variables:
          DEEP_DIVE_SIGNING_SECRET: !Sub "{{resolve:ssm-secure:/llm-rss/deep-dive/signing-secret}}"
          WORKER_FUNCTION_NAME: !Ref DeepDiveWorkerLambda

  TriggerFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt TriggerLambda.Arn
      AuthType: NONE

  TriggerFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TriggerLambda.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  # -------------------------------------------------------------------------
  # Lambda Function — Deep Dive worker (container image)
  # -------------------------------------------------------------------------
  DeepDiveWorkerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: llm-rss-deep-dive-worker
      PackageType: Image
      Code:
        ImageUri: !Ref DeepDiveImageUri
      Role: !GetAtt WorkerExecutionRole.Arn
      Timeout: 900
      MemorySize: 3008

  # -------------------------------------------------------------------------
  # EventBridge scheduled rule — Monday 07:30 UTC (08:30 CET)
  # -------------------------------------------------------------------------
  IacrScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: llm-rss-iacr-weekly
      Description: Trigger IACR Lambda weekly on Monday at 07:30 UTC
      ScheduleExpression: "cron(30 7 ? * MON *)"
      State: ENABLED
      Targets:
        - Id: IacrLambdaTarget
          Arn: !GetAtt IacrLambda.Arn

  IacrSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt IacrLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IacrScheduleRule.Arn

Outputs:
  LambdaFunctionName:
    Value: !Ref IacrLambda
  LambdaFunctionArn:
    Value: !GetAtt IacrLambda.Arn
  LayerArn:
    Value: !Ref DependenciesLayer
  ScheduleRuleName:
    Value: !Ref IacrScheduleRule
  TriggerFunctionArn:
    Value: !GetAtt TriggerLambda.Arn
  TriggerFunctionUrl:
    Value: !GetAtt TriggerFunctionUrl.FunctionUrl
  WorkerFunctionArn:
    Value: !GetAtt DeepDiveWorkerLambda.Arn
  WorkerFunctionName:
    Value: !Ref DeepDiveWorkerLambda
