<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{subject}</title>
  <style>
    body {{
      font-family: Georgia, serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px;
      color: #1a1a1a;
      background: #ffffff;
    }}
    h1 {{
      font-size: 1.4rem;
      margin-bottom: 4px;
    }}
    .meta {{
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 32px;
    }}
    .paper {{
      border-top: 1px solid #e0e0e0;
      padding: 20px 0;
    }}
    .paper-title {{
      font-size: 1.05rem;
      font-weight: bold;
      margin: 0 0 4px;
    }}
    .paper-title a {{
      color: #1a1a1a;
      text-decoration: none;
    }}
    .paper-title a:hover {{
      text-decoration: underline;
    }}
    .paper-authors {{
      font-size: 0.85rem;
      color: #555;
      margin: 0 0 4px;
    }}
    .paper-date {{
      font-size: 0.8rem;
      color: #888;
      margin: 0 0 8px;
    }}
    .paper-score {{
      display: inline-block;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      margin-bottom: 10px;
    }}
    .paper-summary {{
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0 0 8px;
    }}
    .paper-subjects {{
      font-size: 0.78rem;
      color: #888;
    }}
    footer {{
      margin-top: 40px;
      font-size: 0.75rem;
      color: #aaa;
      border-top: 1px solid #e0e0e0;
      padding-top: 16px;
    }}
  </style>
</head>
<body>
  <h1>{source_name} Digest</h1>
  <p class="meta">{paper_count} paper{paper_count_plural} &middot; {run_date}</p>

  {papers_html}

  <footer>
    Generated by llm-rss &middot; Relevance threshold: {threshold}/10
  </footer>
</body>
</html>
