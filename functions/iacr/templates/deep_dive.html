<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Dive: {title}</title>
  <style>
    body {{
      font-family: Georgia, serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px;
      color: #1a1a1a;
      background: #ffffff;
    }}
    h1 {{
      font-size: 1.4rem;
      margin-bottom: 4px;
    }}
    .label {{
      display: inline-block;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-family: sans-serif;
    }}
    .section {{
      border-top: 1px solid #e0e0e0;
      padding: 16px 0;
    }}
    .section h2 {{
      font-size: 1rem;
      margin: 0 0 8px;
    }}
    .section p {{
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0;
      white-space: pre-wrap;
    }}
    .tldr {{
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: #f8f8f8;
      border-left: 3px solid #1a1a1a;
    }}
    footer {{
      margin-top: 40px;
      font-size: 0.75rem;
      color: #aaa;
      border-top: 1px solid #e0e0e0;
      padding-top: 16px;
    }}
  </style>
</head>
<body>
  <span class="label">Deep Dive</span>
  <h1>{title}</h1>

  <p class="tldr">{tldr}</p>

  <div class="section">
    <h2>Problem &amp; Motivation</h2>
    <p>{problem_and_motivation}</p>
  </div>

  <div class="section">
    <h2>Key Contributions</h2>
    <p>{key_contributions}</p>
  </div>

  <div class="section">
    <h2>How It Works</h2>
    <p>{how_it_works}</p>
  </div>

  <div class="section">
    <h2>Results &amp; Evidence</h2>
    <p>{results_and_evidence}</p>
  </div>

  <div class="section">
    <h2>Limitations &amp; Assumptions</h2>
    <p>{limitations_and_assumptions}</p>
  </div>

  <footer>
    Generated by llm-rss Deep Dive
  </footer>
</body>
</html>
